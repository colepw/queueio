<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QueueIO</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- LOBBY -->
  <div id="lobby">
    <h1>QueueIO</h1>
    <div class="lobby-card">
      <button id="generate-btn" onclick="generateRoom()">GENERATE CODE</button>
      <div class="divider"><span>or</span></div>
      <div class="join-row">
        <input id="join-input" type="text" maxlength="4" placeholder="Enter code" />
        <button id="join-btn" onclick="joinRoom()">JOIN</button>
      </div>
      <p id="lobby-error"></p>
    </div>
  </div>

  <!-- ROOM -->
  <div id="room" class="hidden">
    <div id="room-header">
      <h1>QueueIO</h1>
      <div id="room-meta">
        <span id="room-code-display"></span>
        <span id="owner-badge" class="hidden">OWNER</span>
        <button id="leave-btn" onclick="leaveRoom()">LEAVE</button>
      </div>
    </div>

    <div id="room-body">
      <button id="ask-btn" onclick="toggleInput()">ASK</button>
      <div id="input-area">
        <textarea id="q-input" placeholder="Type your question... (Ctrl+Enter to submit)"></textarea>
        <button id="submit-btn" onclick="submitQuestion()">SUBMIT</button>
      </div>
      <div id="queue"></div>
      <p id="empty-msg" class="hidden">No questions yet. Be the first to ask!</p>
    </div>
  </div>

  <!-- Supabase JS SDK (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
